<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:p="primefaces"
>
<f:view>
    <h:head><title>App Users</title></h:head>
    <h:body>
        <div style="max-width: 900px; margin: 40px auto; font-family: Arial, sans-serif;">
            <h1 style="text-align:center; margin-bottom: 30px;">App User Register</h1>
            <h:form id="registeredUsers">
                <p:panel header="Create new user" style="margin-bottom: 30px; background-color: lightgoldenrodyellow">
                    <p:messages showSummary="true" showDetail="true" style="margin-bottom: 20px;"/>

                    <div style="margin-bottom: 20px;">
                        <h:outputLabel for="username" value="Username"
                                       style="display:block; margin-bottom: 8px;"/>
                        <p:inputText id="username" value="#{appUserBean.username}"
                                     required="true" style="width:100%;"/>
                    </div>

                    <div style="margin-bottom: 20px;">
                        <h:outputLabel for="password" value="Password"
                                       style="display:block; margin-bottom: 8px;"/>
                        <p:password id="password" value="#{appUserBean.password}"
                                    required="true" feedback="false" style="width:100%;"/>
                    </div>

                    <h:outputText value=""/>
                    <p:commandButton value="Save" action="#{appUserBean.saveUser}"
                                     style="width:100%;"/>

                </p:panel>
            </h:form>

            <h:form id="userTable">
                <p:panel header="All Users">
                    <p:dataTable value="#{appUserBean.users}"
                                 var="user" paginator="true" paginatorPosition="bottom" rows="5"
                                 stripedRows="true" responsiveLayout="scroll"
                                 style="margin-top:10px; text-align:center">
                        <p:column headerText="ID" style="width:120px;">
                            #{user.id}
                        </p:column>

                        <p:column headerText="Username">
                            #{user.username}
                        </p:column>
                    </p:dataTable>
                </p:panel>
            </h:form>
        </div>
    </h:body>
</f:view>
</html>
