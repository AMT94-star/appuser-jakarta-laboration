<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html">
<f:view>
    <h:head><title>App Users</title></h:head>
    <h:body>
        <h1>App user Register</h1>
        <h:form>
            <h:panelGrid columns="2">
                <h:outputLabel value="Username: "/>
                <h:inputText value="#{appUserBean.username}" required="true"/>

                <h:outputLabel value="Password: "/>
                <h:inputText value="#{appUserBean.password}" required="true"/>

                <h:outputText value=""/>
                <h:commandButton value="Save" action="#{appUserBean.saveUser()}"/>

            </h:panelGrid>
        </h:form>

        <h2>All Users</h2>
        <h:dataTable value="#{appUserBean.users}" var="user" border="1">
            <h:column>
                <f:facet name="header">ID</f:facet>
                #{user.id}
            </h:column>

            <h:column>
                <f:facet name="header">Username</f:facet>
                #{user.username}
            </h:column>
        </h:dataTable>
    </h:body>
</f:view>
</html>
