<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:p="primefaces"
>
<f:view>
    <h:head>
        <title>App Users</title>
        <link rel="stylesheet" type="text/css" href="#{request.contextPath}/resources/css/appsev.css"/>
    </h:head>

    <h:body>
        <div class="page-container">
            <h1 class="page-title">App User Register</h1>

            <div style="display:flex; gap:30px; align-items:flex-start; justify-content:center;">

                <h:form id="registeredUsers">
                    <p:card style="width:420px">
                        <f:facet name="title">Create new user</f:facet>

                        <p:messages showSummary="true"
                                    showDetail="true"
                                    closable="true"
                                    style="margin-bottom:1rem;"/>

                        <div class="form-field">
                            <h:outputLabel for="username"
                                           value="Username"
                                           styleClass="form-label"/>

                            <p:inputText id="username"
                                         value="#{appUserBean.username}"
                                         required="true"
                                         styleClass="full-width"/>
                        </div>

                        <div class="form-field">
                            <h:outputLabel for="password"
                                           value="Password"
                                           styleClass="form-label"/>

                            <p:password id="password"
                                        value="#{appUserBean.password}"
                                        required="true"
                                        feedback="false"
                                        styleClass="full-width"/>
                        </div>
                        <div style="text-align: center;">
                            <p:commandButton value="Save"
                                             icon="pi pi-user-plus"
                                             action="#{appUserBean.saveUser}"
                                             update="@form userTable"
                                             styleClass="full-width"/></div>
                    </p:card>
                </h:form>

                <h:form id="userTable">
                    <p:card style="width:420px">
                        <f:facet name="title">Registered Users</f:facet>
                        <p:dataTable value="#{appUserBean.users}"
                                     var="user"
                                     paginator="true"
                                     paginatorPosition="bottom"
                                     rows="5"
                                     stripedRows="true"
                                     responsiveLayout="scroll"
                                     style="width:100%;">

                            <p:column headerText="ID" style="width:120px">
                                #{user.id}
                            </p:column>

                            <p:column headerText="Username">
                                #{user.username}
                            </p:column>
                        </p:dataTable>
                    </p:card>
                </h:form>
            </div>
        </div>
    </h:body>
</f:view>
</html>
