<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:p="primefaces"
>
<f:view>
    <h:head>
        <title>Login</title>
        <link rel="stylesheet" type="text/css" href="#{request.contextPath}/resources/css/appsev.css"/>
    </h:head>
    <h:body>
        <div class="center-container">

            <h:form id="loginForm">
                <p:card style="text-align:center;">
                    <f:facet name="title">Log in</f:facet>

                    <p:messages globalOnly="true"
                                showSummary="false"
                                showDetail="true"
                                closable="true"
                                style="margin-bottom:1rem;"/>

                    <div class="form-field">
                        <h:outputLabel for="username"
                                       value="Username"
                                       styleClass="form-label"/>

                        <p:inputText id="username"
                                     value="#{loginBean.username}"
                                     required="true"
                                     styleClass="full-width"/>
                    </div>

                    <div class="form-field">
                        <h:outputLabel for="password"
                                       value="Password"
                                       styleClass="form-label"/>

                        <p:password id="password"
                                    value="#{loginBean.password}"
                                    required="true"
                                    feedback="false"
                                    toggleMask="true"
                                    styleClass="full-width"/>
                    </div>
                    <div style="text-align:center;">
                        <p:commandButton value="Log in"
                                         icon="pi pi-sign-in"
                                         action="#{loginBean.login}"
                                         update="@form"
                                         styleClass="full-width"/></div>
                </p:card>
            </h:form>
        </div>
    </h:body>
</f:view>
</html>
