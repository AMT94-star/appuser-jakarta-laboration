<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:p="primefaces"
>
<f:view>
    <h:head>
        <title>Login</title>
    </h:head>
    <h:body style="background-color: bisque;">
        <div style="max-width: 420px; margin: 80px auto; font-family: Arial, sans-serif;">
            <h1 style="text-align:center; margin-bottom: 30px;">Log in</h1>

            <h:form id="loginForm">
                <p:panel header="App user login" style="background-color: lightgoldenrodyellow">
                    <p:messages globalOnly="true" showSummary="false" showDetail="true"
                                style="color:olivedrab; list-style-type:none;
                                padding-left:0" closable="true"/>

                    <div style="margin-bottom: 20px;">
                        <h:outputLabel for="username" value="Username"
                                       style="display:block; margin-bottom: 8px;"/>
                        <p:inputText id="username" value="#{loginBean.username}"
                                     required="true" style="width:100%;"/>
                    </div>

                    <div style="margin-bottom: 20px;">
                        <h:outputLabel for="password" value="Password"
                                       style="display:block; margin-bottom: 8px;"/>
                        <p:password id="password" value="#{loginBean.password}"
                                    required="true" style="width:100%;"/>
                    </div>

                    <h:outputText value=""/>
                    <p:commandButton value="Log in" action="#{loginBean.login}"
                                     update="@form" style="width:100%;"/>
                </p:panel>
            </h:form>
        </div>
    </h:body>
</f:view>
</html>
