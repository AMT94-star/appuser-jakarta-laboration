<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:p="primefaces"
>
<f:view>
    <h:head>
        <title>Chat</title>
        <link rel="stylesheet" type="text/css" href="#{request.contextPath}/resources/css/appsev.css"/>
    </h:head>

    <h:body>
        <div class="chat-wrapper">

            <h:panelGroup rendered="#{loginBean.loggedInUser != null}">
                <div class="chat-header">

                    <div>
                        <h1 style="margin:0;">Chatlog</h1>
                        <div>Logged in as #{loginBean.displayName}</div>
                    </div>

                    <h:form>
                        <p:commandButton value="Log out"
                                         icon="pi pi-sign-out"
                                         action="#{loginBean.logout}"
                                         severity="secondary"/>
                    </h:form>
                </div>

                <p:card>
                    <f:facet name="title">Current chatroom</f:facet>

                    <div id="messages" class="chat-box"></div>

                    <div class="chat-input-row">
                        <input type="text"
                               id="msg"
                               class="chat-input"
                               placeholder="Message"/>

                        <p:commandButton type="button"
                                         value="Send"
                                         onclick="sendMessage()"
                                         icon="pi pi-send"/>
                    </div>
                </p:card>

                <script>
                    //<![CDATA[
                    const username = "#{loginBean.displayName}";
                    const socket = new WebSocket("ws://localhost:8080/websocket-laboration/ws/chat");

                    socket.onmessage = (event) => {
                        let div = document.getElementById("messages");
                        let p = document.createElement("p");
                        p.textContent = event.data;
                        p.className = "chat-message";
                        div.appendChild(p);
                        div.scrollTop = div.scrollHeight;
                    };

                    socket.onopen = () => {
                        console.log("Connected to WebSocket server");
                    };

                    const sendMessage = () => {
                        let text = document.getElementById("msg").value;
                        socket.send(username + ": " + text);
                        document.getElementById("msg").value = "";
                    }

                    document.getElementById("msg").addEventListener("keydown", function (event) {
                        if (event.key == "Enter") {
                            event.preventDefault();
                            sendMessage();
                        }
                    });
                    //]]>
                </script>

            </h:panelGroup>

            <h:panelGroup rendered="#{loginBean.loggedInUser == null}">
                <p:card>
                    <p>You are not logged in.</p>
                    <h:link outcome="/login.xhtml" value="Go to login"/>
                </p:card>
            </h:panelGroup>
        </div>
    </h:body>
</f:view>
</html>
